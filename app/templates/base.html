<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orgi — Finanzas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>O</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1 class="logo">Orgi</h1>
            <nav class="nav">
                {% for p in paginas %}
                <a href="{{ p.ruta }}" class="nav-link {% if pagina_actual == p.ruta %}active{% endif %}">
                    {{ p.nombre }}
                </a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
