{% extends "base.html" %}
{% block content %}
<div class="page" id="page-categorias">
    <div class="page-header">
        <h2 class="page-title">Categorias</h2>
        <div class="page-header-actions">
            <button class="btn-secondary btn-sm" onclick="abrirModalEtiquetas()">🏷️ Etiquetas</button>
            <button class="btn-primary" onclick="abrirModalCategoria()">+ Nueva</button>
        </div>
    </div>

    <div class="cat-grid" id="cat-grid">
        <div class="cat-loading">Cargando categorias...</div>
    </div>
</div>

<!-- MODAL NUEVA/EDITAR CATEGORIA -->
<div class="modal-overlay" id="modal-categoria" style="display:none;" onclick="cerrarModalCategoria(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 class="modal-titulo" id="modal-cat-titulo">Nueva Categoria</h2>
        <form id="form-categoria" onsubmit="guardarCategoria(event)">
            <input type="hidden" id="form-cat-nombre-original">
            <div class="modal-campo">
                <label>Nombre</label>
                <input type="text" id="form-cat-nombre" required>
            </div>
            <div class="modal-campo">
                <label>Icono (emoji)</label>
                <input type="text" id="form-cat-icono" placeholder="🍽️" maxlength="10">
            </div>
            <div class="modal-campo">
                <label>Color</label>
                <div class="color-picker-row">
                    <input type="color" id="form-cat-color" value="#FF6384">
                    <span class="color-hex" id="form-cat-color-hex">#FF6384</span>
                </div>
            </div>
            <div class="modal-acciones">
                <button type="button" class="btn-cancelar" onclick="cerrarModalCategoria()">Cancelar</button>
                <button type="submit" class="btn-guardar">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL GESTION DE ETIQUETAS -->
<div class="modal-overlay" id="modal-etiquetas" style="display:none;" onclick="cerrarModalEtiquetas(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-titulo">Gestionar Etiquetas</h2>
            <button class="tx-viewer-cerrar" onclick="cerrarModalEtiquetas()">✕</button>
        </div>
        <div class="etiquetas-toolbar">
            <button class="btn-primary btn-sm" onclick="abrirNuevaEtiqueta()">+ Nueva</button>
        </div>
        <div class="etiquetas-lista" id="etiquetas-lista">
            <div class="detalle-loading">Cargando...</div>
        </div>
    </div>
</div>

<!-- MODAL NUEVA/EDITAR ETIQUETA -->
<div class="modal-overlay" id="modal-etiqueta-form" style="display:none;" onclick="cerrarModalEtiquetaForm(event)">
    <div class="modal modal-small" onclick="event.stopPropagation()">
        <h2 class="modal-titulo" id="modal-etq-titulo">Nueva Etiqueta</h2>
        <form id="form-etiqueta" onsubmit="guardarEtiqueta(event)">
            <input type="hidden" id="form-etq-id">
            <div class="modal-campo">
                <label>Nombre</label>
                <input type="text" id="form-etq-nombre" required>
            </div>
            <div class="modal-campo">
                <label>Color</label>
                <div class="color-picker-row">
                    <input type="color" id="form-etq-color" value="#6B7280">
                    <span class="color-hex" id="form-etq-color-hex">#6B7280</span>
                </div>
            </div>
            <div class="modal-acciones">
                <button type="button" class="btn-cancelar" onclick="cerrarModalEtiquetaForm()">Cancelar</button>
                <button type="submit" class="btn-guardar">Guardar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL ASIGNAR ETIQUETAS A TRANSACCION -->
<div class="modal-overlay" id="modal-tag-tx" style="display:none;" onclick="cerrarModalTagTx(event)">
    <div class="modal modal-small" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-titulo" id="tag-tx-titulo">Etiquetas</h2>
            <button class="tx-viewer-cerrar" onclick="cerrarModalTagTx()">✕</button>
        </div>
        <div class="etiquetas-grid" id="etiquetas-grid"></div>
        <div class="modal-acciones">
            <button type="button" class="btn-cancelar" onclick="cerrarModalTagTx()">Cerrar</button>
        </div>
    </div>
</div>

<!-- MODAL TRANSACCIONES POR CATEGORIA -->
<div class="modal-overlay" id="modal-cat-tx" style="display:none;" onclick="cerrarModalCatTx(event)">
    <div class="modal modal-tx" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="cat-tx-titulo">Transacciones</h2>
            <button class="tx-viewer-cerrar" onclick="cerrarModalCatTx()">✕</button>
        </div>
        <div class="cat-tx-filtros">
            <div class="cat-tx-filtro-row">
                <label>Desde: <input type="date" id="cat-tx-desde" onchange="cargarCatTx()"></label>
                <label>Hasta: <input type="date" id="cat-tx-hasta" onchange="cargarCatTx()"></label>
            </div>
            <div class="cat-tx-filtro-row">
                <label>Metodo:
                    <select id="cat-tx-metodo" multiple onchange="cargarCatTx()">
                        <option value="efectivo">Efectivo</option>
                        <option value="tarjeta_credito">Tarjeta Credito</option>
                        <option value="transferencia">Transferencia</option>
                    </select>
                </label>
                <label>Orden:
                    <select id="cat-tx-orden" onchange="cargarCatTx()">
                        <option value="fecha">Fecha</option>
                        <option value="valor">Valor</option>
                    </select>
                </label>
                <label>Dir:
                    <select id="cat-tx-dir" onchange="cargarCatTx()">
                        <option value="true">Desc</option>
                        <option value="false">Asc</option>
                    </select>
                </label>
            </div>
        </div>
        <div class="cat-tx-total" id="cat-tx-total"></div>
        <div class="cat-tx-lista" id="cat-tx-lista">
            <div class="detalle-loading">Cargando...</div>
        </div>
    </div>
</div>

<script src="/static/js/categorias.js"></script>

<style>
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 700; }
.btn-primary { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--primary-light); }

.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.cat-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
.cat-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(45,106,79,0.08); }
.cat-card-icono { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
.cat-card-info { flex: 1; min-width: 0; }
.cat-card-nombre { display: block; font-weight: 600; font-size: 14px; }
.cat-card-stats { display: block; font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.cat-card-edit { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; border-radius: 6px; }
.cat-card-edit:hover { background: var(--bg); }
.cat-loading { text-align: center; padding: 40px; color: var(--text-secondary); grid-column: 1 / -1; }

.color-picker-row { display: flex; align-items: center; gap: 10px; }
.color-picker-row input[type="color"] { width: 48px; height: 40px; border: 1px solid var(--border); border-radius: 6px; padding: 2px; cursor: pointer; }
.color-hex { font-size: 13px; color: var(--text-secondary); font-family: monospace; }

.modal-tx { max-width: 600px; max-height: 85vh; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.cat-tx-filtros { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.cat-tx-filtro-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.cat-tx-filtro-row label { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.cat-tx-filtro-row select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.cat-tx-filtro-row input[type="date"] { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
.cat-tx-filtro-row select[multiple] { height: 60px; }
.cat-tx-total { padding: 8px 16px; font-size: 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
.cat-tx-lista { padding: 8px 16px 16px; overflow-y: auto; flex: 1; }

.tag-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; border: 1px solid; margin: 1px; font-weight: 500; }
.tx-tags { margin-top: 2px; display: flex; flex-wrap: wrap; gap: 2px; }

.page-header-actions { display: flex; gap: 8px; align-items: center; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-secondary:hover { background: var(--bg); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 4px; line-height: 1; }
.btn-icon:hover { background: var(--bg); }
.btn-tag { opacity: 0.5; }
.detalle-tx:hover .btn-tag { opacity: 1; }
.modal-small { max-width: 360px; }

.etiquetas-toolbar { padding: 0 0 10px; }
.etiquetas-lista { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
.etiqueta-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
.etiqueta-acciones { display: flex; gap: 4px; }

.etiquetas-grid { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; padding: 8px 0; }
.etiqueta-asignar { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; font-size: 14px; transition: all 0.15s; }
.etiqueta-asignar:hover { border-color: var(--accent); }
.etiqueta-asignar.asignada { border-color: var(--primary); }
.etq-check { font-weight: 700; font-size: 16px; color: var(--primary); }

@media (max-width: 768px) {
    .cat-grid { grid-template-columns: 1fr; }
    .modal-tx { max-width: 100%; margin: 8px; max-height: 90vh; }
}
</style>
{% endblock %}
