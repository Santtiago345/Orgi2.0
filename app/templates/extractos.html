{% extends "base.html" %}

{% block content %}
<div class="page" id="page-extractos">

    <h2 class="page-title">Extractos Bancarios</h2>

    <!-- SUBIR PDF -->
    <section class="upload-section">
        <div class="upload-card" id="upload-card">
            <div class="upload-icon">📄</div>
            <p class="upload-text">Arrastra un PDF aquí o haz clic para seleccionar</p>
            <input type="file" id="pdf-upload-input" accept=".pdf" style="display:none" onchange="subirPDF(this.files[0])">
            <button class="btn-upload" onclick="document.getElementById('pdf-upload-input').click()">Seleccionar PDF</button>
        </div>
        <div id="upload-progress" class="upload-progress" style="display:none;">
                <div class="spinner"></div>
                <div>
                    <p id="upload-status">Procesando extracto...</p>
                    <small id="upload-substatus" style="color:var(--text-secondary)"></small>
                </div>
        </div>
        <div id="upload-result" class="upload-result" style="display:none;"></div>
    </section>

    <!-- LISTADO POR BANCO -->
    <section class="extractos-list" id="extractos-list">
        <div class="extractos-loading">Cargando extractos...</div>
    </section>

</div>

<!-- MODAL DETALLE EXTRACTO -->
<div class="modal-overlay" id="detalle-modal" style="display:none;" onclick="cerrarDetalle(event)">
    <div class="modal modal-extracto" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 id="detalle-titulo">Detalle</h2>
            <button class="tx-viewer-cerrar" onclick="cerrarDetalle()">✕</button>
        </div>
        <div class="detalle-body" id="detalle-body">
            <div class="detalle-loading">Cargando...</div>
        </div>
    </div>
</div>

<script src="/static/js/extractos.js"></script>

<style>
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; color: var(--text); }

.upload-card { background: var(--surface); border: 2px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-card:hover, .upload-card.drag-over { border-color: var(--accent); background: #f0fdf4; }
.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-text { color: var(--text-secondary); margin-bottom: 16px; font-size: 14px; }
.btn-upload { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-upload:hover { background: var(--primary-light); }

.upload-progress { text-align: center; padding: 32px; background: var(--surface); border-radius: var(--radius); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.upload-result { margin-top: 12px; }
.result-ok { display: flex; align-items: center; gap: 12px; background: #f0fdf4; border: 1px solid #86efac; border-radius: var(--radius); padding: 16px; }
.result-icon { font-size: 24px; }
.result-info strong { display: block; margin-bottom: 4px; color: var(--text); }
.result-info p { font-size: 13px; color: var(--text-secondary); margin: 0; }
.result-error { background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); padding: 16px; text-align: center; color: var(--danger); }

.banco-grupo { margin-bottom: 24px; }
.banco-titulo { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.banco-count { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
.banco-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
.extracto-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; transition: all 0.2s; cursor: pointer; }
.extracto-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(45,106,79,0.1); }
.extracto-icono { font-size: 24px; }
.extracto-info { flex: 1; min-width: 0; }
.extracto-periodo { display: block; font-weight: 600; font-size: 14px; }
.extracto-titular { display: block; font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.extracto-txs { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
.extractos-loading { text-align: center; padding: 40px; color: var(--text-secondary); }

/* MODAL EXTRACTO */
.modal-extracto { max-width: 640px; max-height: 85vh; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1; }
.modal-header h2 { font-size: 17px; }
.detalle-body { padding: 16px 20px 20px; overflow-y: auto; flex: 1; }
.detalle-loading { text-align: center; padding: 32px; color: var(--text-secondary); }

.detalle-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; padding: 12px; background: var(--bg); border-radius: 8px; }
.detalle-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.detalle-label { color: var(--text-secondary); }
.detalle-valor { font-weight: 500; }

.detalle-subtitle { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
.detalle-tc { margin-bottom: 16px; }
.tc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.tc-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--bg); border-radius: 6px; font-size: 13px; }
.tc-item.highlight { background: #e8f5e9; border: 1px solid #c8e6c9; }
.tc-label { color: var(--text-secondary); }
.tc-valor { font-weight: 700; color: var(--text); }

.detalle-cuotas { margin-bottom: 16px; }
.cuota-grupo { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 6px; margin-bottom: 4px; font-size: 13px; }
.cuota-desc { font-weight: 500; }
.cuota-valor { color: var(--primary); font-weight: 600; }

.detalle-resumen { margin-bottom: 16px; }
.resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.resumen-item { padding: 12px; border-radius: 8px; text-align: center; }
.resumen-item.positivo { background: #f0fdf4; border: 1px solid #86efac; }
.resumen-item.negativo { background: #fef2f2; border: 1px solid #fecaca; }
.resumen-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
.resumen-valor { display: block; font-weight: 700; font-size: 20px; }
.resumen-item.positivo .resumen-valor { color: #16a34a; }
.resumen-item.negativo .resumen-valor { color: #dc2626; }
.resumen-count { display: block; font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

.detalle-tx { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.detalle-tx:last-child { border-bottom: none; }
.tx-icono { font-size: 16px; margin-top: 1px; }
.tx-body { flex: 1; min-width: 0; }
.tx-desc { display: block; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-fecha { display: block; font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.tx-cuota-badge { display: inline-block; font-size: 10px; background: #fff7ed; color: #c2410c; padding: 1px 6px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
.tx-valor { font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.tx-valor.positivo { color: #16a34a; }
.tx-valor.negativo { color: #dc2626; }

@media (max-width: 768px) {
    .modal-extracto { max-width: 100%; margin: 8px; max-height: 90vh; }
    .tc-grid { grid-template-columns: 1fr; }
    .resumen-grid { grid-template-columns: 1fr; }
    .banco-lista { grid-template-columns: 1fr; }
}
</style>
{% endblock %}
